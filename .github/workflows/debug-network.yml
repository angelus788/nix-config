name: Network Debug
on: workflow_dispatch

jobs:
  debug:
    runs-on: debian-latest # Use the same label as your failing job
    steps:
      - name: Check DNS and Connectivity
        run: |
          echo "Checking DNS resolution..."
          nslookup git.avgtechguy.com || echo "DNS Failed"
          
          echo "Checking HTTP connectivity..."
          curl -I https://git.avgtechguy.com || echo "Curl Failed"
          
          echo "Checking Git visibility..."
          git ls-remote https://git.avgtechguy.com/avgtechguy/actions.git || echo "Git Clone would fail"