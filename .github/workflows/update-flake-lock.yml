name: Update flake.lock

# 1. Define your "Variables" here using YAML anchors
x-constants:
  forgejo_url: &forgejo_url "https://git.avgtechguy.com"
  forgejo_host: &forgejo_host "git.avgtechguy.com"
  attic_url: &attic_url "https://cache.avgtechguy.com"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update-flake-github:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      # ... (GitHub steps remain same) ...

  update-flake-forgejo:
    if: contains(github.server_url, 'avgtechguy.com')
    runs-on: nix
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up SSH
        # 2. Use the '*' to inject the value
        uses: *forgejo_url/avgtechguy/actions/set-up-ssh@main
        with:
          git-host: *forgejo_host
          ssh-key: ${{ secrets.SECRETS_REPOSITORY_PRIVATE_KEY }}
          git-hostkey: ${{ secrets.GIT_HOSTKEY }}
          
      - name: Setup Attic
        uses: *forgejo_url/avgtechguy/actions/setup-attic-cache@main
        with:
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          attic-url: *attic_url
          
      - name: "Update nix flake"
        run: nix flake update
        
      - name: "Commit and push the new flake.lock"
        run: |
          git config user.name forgejo-actions
          git config user.email forgejo@git.avgtechguy.com
          git add flake.lock
          git diff-index --quiet HEAD || git commit -m "chore: Update flake.lock"
          git push origin main
          
      - name: Cache to Attic
        uses: *forgejo_url/avgtechguy/actions/cache-to-attic@main