name: "Set up SSH for connecting to a private repo"
description: "Configures SSH for Alpine-based Nix runners and updates the flake"
inputs:
  ssh-key:
    description: "The raw private key content"
    required: true
  git-host:
    description: "Git host (e.g., git.avgtechguy.com)"
    required: true
  git-hostkey:
    description: "Host key fingerprint from ssh-keyscan"
    required: true
runs:
  using: composite
  steps:
    - name: "Setup SSH Files"
      shell: sh
      run: |
        mkdir -p /tmp/.ssh
        chmod 700 /tmp/.ssh

        # Read the raw input variable cleanly via an environment variable
        # This completely avoids shell expansion or indentation issues
        cat << 'EOF' > /tmp/.ssh/id_ed25519
        ${{ inputs.ssh-key }}
        EOF
        
        # Strip any leading whitespace inline using sed cleanly
        sed -i 's/^[[:space:]]*//' /tmp/.ssh/id_ed25519
        chmod 600 /tmp/.ssh/id_ed25519

        # Safely write known_hosts
        cat << 'EOF' > /tmp/.ssh/known_hosts
        ${{ inputs.git-hostkey }}
        EOF
        sed -i 's/^[[:space:]]*//' /tmp/.ssh/known_hosts
        chmod 644 /tmp/.ssh/known_hosts

        # Generate config pointing explicitly to the temporary assets
        cat << EOF > /tmp/.ssh/config
        Host ${{ inputs.git-host }}
          HostName ${{ inputs.git-host }}
          User forgejo
          IdentityFile /tmp/.ssh/id_ed25519
          IdentitiesOnly yes
          Port 69
          UserKnownHostsFile /tmp/.ssh/known_hosts
          StrictHostKeyChecking yes
        EOF
        chmod 644 /tmp/.ssh/config

    - name: "Update Nix Flake"
      shell: sh
      run: |
        # Force the isolated Nix builder environment to respect our custom SSH configuration
        export NIX_SSHOPTS="-F /tmp/.ssh/config"
        export GIT_SSH_COMMAND="ssh -F /tmp/.ssh/config"
        
        nix flake update --commit-lock-file