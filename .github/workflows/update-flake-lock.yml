name: Update flake.lock
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update-flake-github:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lix
        run: curl -sSfL https://install.lix.systems/lix | sh -s -- install --no-confirm
      - name: Update and Commit
        run: |
           nix flake update
           if ! git diff --quiet; then
             git config user.name "github-actions[bot]"
             git config user.email "github-actions[bot]@users.noreply.github.com"
             git add flake.lock
             git commit -m "chore: update flake.lock"
             git push
           fi

  update-flake-forgejo:
    if: contains(github.server_url, 'avgtechguy.com')
    runs-on: nix
    environment: production
    # Theme variables defined here
    env:
      FORGEJO_HOST: git.avgtechguy.com
      ATTIC_HOST: cache.avgtechguy.com
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up SSH
        # We must hardcode the URL in 'uses', but we use the variables in 'with'
        uses: https://git.avgtechguy.com/avgtechguy/actions/set-up-ssh@main
        with:
          git-host: ${{ env.FORGEJO_HOST }}
          ssh-key: ${{ secrets.SECRETS_REPOSITORY_PRIVATE_KEY }}
          git-hostkey: ${{ secrets.GIT_HOSTKEY }}
          
      - name: Setup Attic
        uses: https://git.avgtechguy.com/avgtechguy/actions/setup-attic-cache@main
        with:
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          attic-url: https://${{ env.ATTIC_HOST }}
          
      - name: "Update nix flake"
        run: nix flake update
        
      - name: "Commit and push"
        run: |
          git config user.name forgejo-actions
          git config user.email forgejo@${{ env.FORGEJO_HOST }}
          git add flake.lock
          git diff-index --quiet HEAD || git commit -m "chore: Update flake.lock"
          git push origin main
          
      - name: Cache to Attic
        uses: https://git.avgtechguy.com/avgtechguy/actions/cache-to-attic@main